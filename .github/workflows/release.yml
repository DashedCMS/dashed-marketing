name: Release
on:
  pull_request:
    types: [opened, synchronize, closed]
    branches: [master, main]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no tag/commit/PR)'
        type: boolean
        default: false
permissions:
  contents: write
  pull-requests: write
jobs:
  release:
    uses: DashedCMS/release-tooling/.github/workflows/release-package.yml@main
    with:
      package_name: dashed-marketing
      default_branch: main
      dry_run: ${{ inputs.dry_run || false }}
    secrets:
      PARENT_REPO_TOKEN: ${{ secrets.PARENT_REPO_TOKEN }}
